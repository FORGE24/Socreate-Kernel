name: Socreate OS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'SPECS/**'
      - 'SOURCES/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_kernel:
        description: 'Also build kernel RPMs (slow, ~1-2h)'
        type: boolean
        default: true
      kernel_jobs:
        description: 'Parallel make jobs for kernel'
        type: string
        default: '4'
      fedora_version:
        description: 'Fedora base version'
        type: string
        default: '44'
      kernel_nevr:
        description: 'Kernel NEVR to rebuild (e.g. 7.0.12-201.fc44)'
        type: string
        default: '7.0.12-201.fc44'

env:
  FEDORA_VERSION: ${{ github.event.inputs.fedora_version || '44' }}
  KERNEL_NEVR: ${{ github.event.inputs.kernel_nevr || '7.0.12-201.fc44' }}
  SOCREATE_DIST: .soc26h1q2

jobs:
  socreate-release:
    name: socreate-release
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - name: Install build tools
        run: dnf install -y rpm-build rpmdevtools curl git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build socreate-release
        run: |
          chmod +x scripts/ci/build-release.sh
          ./scripts/ci/build-release.sh

      - name: Upload socreate-release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-rpms
          path: RPMS/noarch/
          if-no-files-found: error

      - name: Upload socreate-release SRPM
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-srpm
          path: SRPMS/socreate-release-*.src.rpm
          if-no-files-found: error

  kernel:
    name: kernel-rebrand
    needs: socreate-release
    if: >-
      needs.socreate-release.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.build_kernel)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: fedora:44
    steps:
      - name: Install base tools
        run: dnf install -y rpm-build rpmdevtools curl git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          dnf clean all
          rm -rf /var/cache/dnf /tmp/* /var/log/*
          df -h /

      - name: Build kernel
        env:
          JOBS: ${{ github.event.inputs.kernel_jobs || '4' }}
          FEDORA_VERSION: ${{ env.FEDORA_VERSION }}
          KERNEL_NEVR: ${{ env.KERNEL_NEVR }}
          SOCREATE_DIST: ${{ env.SOCREATE_DIST }}
        run: |
          chmod +x scripts/ci/build-kernel.sh
          ./scripts/ci/build-kernel.sh

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-rpms
          path: RPMS/x86_64/
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [socreate-release, kernel]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.kernel.result == 'success' || needs.kernel.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download socreate-release RPMs
        uses: actions/download-artifact@v4
        with:
          name: socreate-release-rpms
          path: dist/rpms/noarch/

      - name: Download socreate-release SRPM
        uses: actions/download-artifact@v4
        with:
          name: socreate-release-srpm
          path: dist/srpms/

      - name: Download kernel RPMs
        if: needs.kernel.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kernel-rpms
          path: dist/rpms/x86_64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rpms/noarch/*.rpm
            dist/rpms/x86_64/*.rpm
            dist/srpms/*.src.rpm
          generate_release_notes: true
