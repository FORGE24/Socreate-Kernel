name: Socreate OS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'SPECS/**'
      - 'SOURCES/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_kernel:
        description: 'Also build kernel RPMs (baseonly, ~30-60m on GHA)'
        type: boolean
        default: true
      build_mirror_upload:
        description: 'Build mirror upload tarball (overlay + Fedora seed RPMs)'
        type: boolean
        default: true
      kernel_jobs:
        description: 'Parallel make jobs (empty = auto from CPU/RAM)'
        type: string
        default: ''
      fedora_version:
        description: 'Fedora base version'
        type: string
        default: '44'
      kernel_nevr:
        description: 'Kernel NEVR to rebuild (e.g. 7.0.12-201.fc44)'
        type: string
        default: '7.0.12-201.fc44'

env:
  FEDORA_VERSION: ${{ github.event.inputs.fedora_version || '44' }}
  KERNEL_NEVR: ${{ github.event.inputs.kernel_nevr || '7.0.12-201.fc44' }}
  SOCREATE_DIST: .soc26h1q2

jobs:
  socreate-release:
    name: socreate-core
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - name: Install build tools
        run: dnf install -y rpm-build rpmdevtools curl git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build socreate core packages
        run: |
          chmod +x scripts/ci/build-release.sh
          ./scripts/ci/build-release.sh

      - name: Upload socreate RPMs
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-rpms
          path: RPMS/noarch/
          if-no-files-found: error

      - name: Upload socreate SRPMs
        uses: actions/upload-artifact@v4
        with:
          name: socreate-release-srpm
          path: SRPMS/socreate-*.src.rpm
          if-no-files-found: error

  kernel:
    name: kernel-rebrand
    needs: socreate-release
    if: >-
      needs.socreate-release.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.build_kernel)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: fedora:44
    steps:
      - name: Install base tools
        run: dnf install -y rpm-build rpmdevtools curl git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          dnf clean all
          rm -rf /var/cache/dnf /tmp/* /var/log/*
          df -h /

      - name: Cache kernel SRPM
        uses: actions/cache@v4
        with:
          path: SOURCES/kernel-*.src.rpm
          key: kernel-srpm-${{ env.KERNEL_NEVR }}
          restore-keys: |
            kernel-srpm-

      - name: Build kernel
        env:
          JOBS: ${{ github.event.inputs.kernel_jobs }}
          FEDORA_VERSION: ${{ env.FEDORA_VERSION }}
          KERNEL_NEVR: ${{ env.KERNEL_NEVR }}
          SOCREATE_DIST: ${{ env.SOCREATE_DIST }}
        run: |
          chmod +x scripts/ci/build-kernel.sh
          ./scripts/ci/build-kernel.sh

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-rpms
          path: |
            RPMS/x86_64/kernel-[0-9]*.rpm
            RPMS/x86_64/kernel-core-[0-9]*.rpm
            RPMS/x86_64/kernel-modules-core-[0-9]*.rpm
            RPMS/x86_64/kernel-modules-[0-9]*.rpm
            RPMS/x86_64/kernel-devel-[0-9]*.rpm
          if-no-files-found: error

  mirror-upload:
    name: mirror-upload-package
    needs: [socreate-release, kernel]
    if: >-
      needs.socreate-release.result == 'success' &&
      needs.kernel.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.build_mirror_upload)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: fedora:44
    steps:
      - name: Install packaging tools
        run: dnf install -y rpm-build createrepo_c curl rsync

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download socreate RPMs
        uses: actions/download-artifact@v4
        with:
          name: socreate-release-rpms
          path: RPMS/noarch/

      - name: Download kernel RPMs
        uses: actions/download-artifact@v4
        with:
          name: kernel-rpms
          path: RPMS/x86_64/

      - name: Build mirror upload package
        env:
          SKIP_BUILD_RELEASE: '1'
          SEED_DOWNLOAD_RETRIES: '3'
        run: |
          chmod +x scripts/ci/*.sh
          ./scripts/ci/prepare-mirror-upload.sh
          ls -lh dist/socreate-*-mirror-upload.tar.gz
          VERIFY_ONLY=1 ./scripts/ci/sync-mirror-base-essentials.sh

      - name: Upload mirror package artifact
        uses: actions/upload-artifact@v4
        with:
          name: socreate-mirror-upload
          path: dist/socreate-*-mirror-upload.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [socreate-release, kernel, mirror-upload]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      needs.socreate-release.result == 'success' &&
      (needs.kernel.result == 'success' || needs.kernel.result == 'skipped') &&
      (needs.mirror-upload.result == 'success' || needs.mirror-upload.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download socreate-release RPMs
        uses: actions/download-artifact@v4
        with:
          name: socreate-release-rpms
          path: dist/rpms/noarch/

      - name: Download socreate-release SRPM
        uses: actions/download-artifact@v4
        with:
          name: socreate-release-srpm
          path: dist/srpms/

      - name: Download kernel RPMs
        if: needs.kernel.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kernel-rpms
          path: dist/rpms/x86_64/

      - name: Download mirror upload package
        if: needs.mirror-upload.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: socreate-mirror-upload
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rpms/noarch/*.rpm
            dist/rpms/x86_64/*.rpm
            dist/srpms/*.src.rpm
            dist/socreate-*-mirror-upload.tar.gz
          generate_release_notes: true
