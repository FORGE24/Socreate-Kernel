# GitHub Actions self-hosted runner on K8s (4 replicas × 4 CPU = 16 core pool)
# Register with: kubectl create secret generic gha-runner-token --from-literal=token=YOUR_PAT
# Docs: https://docs.github.com/en/actions/hosting-your-own-runners
---
apiVersion: v1
kind: Secret
metadata:
  name: gha-runner-token
  namespace: socreate-build
type: Opaque
stringData:
  # Replace with GitHub PAT or registration token before apply
  token: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gha-runner
  namespace: socreate-build
  labels:
    app: gha-runner
spec:
  replicas: 4
  selector:
    matchLabels:
      app: gha-runner
  template:
    metadata:
      labels:
        app: gha-runner
    spec:
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 8Gi
          env:
            - name: RUNNER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUNNER_LABELS
              value: "self-hosted,linux,x64,socreate-k8s,4c-8g"
            - name: GITHUB_OWNER
              value: "FORGE24"
            - name: GITHUB_REPO
              value: "Socreate-Kernel"
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gha-runner-token
                  key: token
          command:
            - /bin/bash
            - -ec
            - |
              ./config.sh --url "https://github.com/${GITHUB_OWNER}/${GITHUB_REPO}" \
                --token "${RUNNER_TOKEN}" \
                --name "${RUNNER_NAME}" \
                --labels "${RUNNER_LABELS}" \
                --unattended --replace
              exec ./run.sh
---
# Dedicated high-memory runner for kernel builds (16 CPU / 32Gi)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gha-runner-kernel
  namespace: socreate-build
  labels:
    app: gha-runner-kernel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gha-runner-kernel
  template:
    metadata:
      labels:
        app: gha-runner-kernel
    spec:
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          resources:
            requests:
              cpu: "16"
              memory: 32Gi
            limits:
              cpu: "16"
              memory: 32Gi
          env:
            - name: RUNNER_NAME
              value: "socreate-kernel-16c"
            - name: RUNNER_LABELS
              value: "self-hosted,linux,x64,socreate-k8s,16c-32g,kernel"
            - name: GITHUB_OWNER
              value: "FORGE24"
            - name: GITHUB_REPO
              value: "Socreate-Kernel"
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gha-runner-token
                  key: token
          command:
            - /bin/bash
            - -ec
            - |
              ./config.sh --url "https://github.com/${GITHUB_OWNER}/${GITHUB_REPO}" \
                --token "${RUNNER_TOKEN}" \
                --name "${RUNNER_NAME}" \
                --labels "${RUNNER_LABELS}" \
                --unattended --replace
              exec ./run.sh
